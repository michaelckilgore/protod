<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch Screen Redirect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    color:#eef6ff;
    background:linear-gradient(180deg,#0b3365 0%, #071d3d 38%, #020c1b 100%);
    display:grid;
    place-items:center;
  }
  .box{
    width:min(920px, 92vw);
    padding:26px 32px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.12);
    background:linear-gradient(180deg, rgba(9,31,61,0.96), rgba(3,15,31,0.96));
    box-shadow:0 18px 34px rgba(0,0,0,0.34);
    text-align:center;
  }
  .title{
    color:#ffd15a;
    font-size:40px;
    font-weight:900;
    letter-spacing:0.8px;
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .copy{
    font-size:22px;
    line-height:1.35;
    color:#eef6ff;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="title">Watch Sample Redirect</div>
    <div class="copy">This legacy sample screen now forwards to <strong>subscreen-watch.html</strong>, which uses a live watch when one exists and otherwise falls back to the most recently issued archived watch marked <strong>EXPIRED / NOT VALID</strong>.</div>
  </div>
<script>
  window.setTimeout(function () {
    window.location.replace("subscreen-watch.html");
  }, 250);
</script>
</body>
</html>
